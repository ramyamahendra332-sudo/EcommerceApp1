name: SonarCloud Scan

on:
  push:
    branches:
      - main

jobs:
  sonar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build + Sonar Scan (Maven way)
        working-directory: EcommerceApp-master/EcommerceApp
        run: |
          mvn clean verify sonar:sonar \
            -Dsonar.projectKey=EcommerceApp1 \
            -Dsonar.organization=ramyamahendra332-sudo \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}
